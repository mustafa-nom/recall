<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" width="920" height="420">
  <defs>
    <linearGradient id="outGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8f5c8"/>
      <stop offset="100%" style="stop-color:#a8e6a8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#c0392b"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2980b9"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#27ae60"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#9b59b6"/>
    </marker>
  </defs>

  <text x="460" y="28" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1a1a2e">Recall - system architecture</text>

  <rect x="24" y="60" width="120" height="72" rx="8" fill="#ffffff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="84" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1a1a2e">User input</text>
  <text x="84" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#444">Web dashboard</text>
  <text x="84" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#666">goals, live steps</text>

  <rect x="170" y="68" width="100" height="56" rx="6" fill="#f0f4ff" stroke="#4a6cf7" stroke-width="1.2"/>
  <text x="220" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">Next.js app</text>
  <text x="220" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#444">UI + API routes</text>

  <rect x="300" y="52" width="280" height="200" rx="10" fill="#f5f5f7" stroke="#888" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1a2e">Python worker (FastAPI)</text>

  <rect x="318" y="88" width="244" height="68" rx="6" fill="#e8e8ec" stroke="#555" stroke-width="1"/>
  <text x="440" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#222">Executor: Gemini Live API</text>
  <text x="440" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#333">Multimodal loop: screenshots + tool calls</text>
  <text x="440" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">(e.g. gemini-2.5-flash-native-audio-latest)</text>

  <rect x="318" y="166" width="118" height="52" rx="6" fill="#e8e8ec" stroke="#555" stroke-width="1"/>
  <text x="377" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#222">Observer</text>
  <text x="377" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#333">Gemini Flash</text>
  <text x="377" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#555">analyze, suggest</text>

  <rect x="448" y="166" width="114" height="52" rx="6" fill="#e8e8ec" stroke="#555" stroke-width="1"/>
  <text x="505" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#222">Hub retrieval</text>
  <text x="505" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#333">Gemini embeddings</text>
  <text x="505" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#555">vector store</text>

  <rect x="318" y="232" width="244" height="44" rx="6" fill="#dde8f7" stroke="#3a6ea5" stroke-width="1"/>
  <text x="440" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">Browser automation</text>
  <text x="440" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#444">Playwright, optional cloud browser</text>

  <rect x="170" y="288" width="410" height="28" rx="6" fill="#e8d5f2" stroke="#9b6bb8" stroke-width="1"/>
  <text x="375" y="306" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#4a2c6a">Streaming to dashboard (SSE + WebSocket previews), parallel</text>

  <rect x="620" y="88" width="276" height="228" rx="12" fill="url(#outGrad)" stroke="#2d6a2d" stroke-width="2" filter="url(#shadow)"/>
  <text x="758" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#0d260d">OUTPUT</text>
  <text x="758" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1a3d1a">Step stream, session view</text>
  <text x="758" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1a3d1a">Live screenshot preview</text>
  <text x="758" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1a3d1a">Hub shortcuts and stats</text>
  <text x="758" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1a3d1a">Verified improvements stored</text>
  <text x="758" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#2d5a2d">Feedback loop: suggestions to Hub to</text>
  <text x="758" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#2d5a2d">better retrieval on future runs</text>

  <path d="M 144 96 L 168 96" stroke="#c0392b" stroke-width="2" marker-end="url(#arrRed)"/>
  <path d="M 270 96 L 298 96" stroke="#c0392b" stroke-width="2" marker-end="url(#arrRed)"/>
  <path d="M 440 156 L 440 228" stroke="#2980b9" stroke-width="2" marker-end="url(#arrBlue)"/>
  <path d="M 564 192 L 612 192" stroke="#27ae60" stroke-width="2" marker-end="url(#arrGreen)"/>
  <path d="M 377 218 L 377 276 L 612 276" fill="none" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <path d="M 505 218 L 505 260 L 600 260" fill="none" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <path d="M 562 120 L 612 120" stroke="#27ae60" stroke-width="2" marker-end="url(#arrGreen)"/>
  <path d="M 562 254 L 612 254" stroke="#27ae60" stroke-width="2" marker-end="url(#arrGreen)"/>
  <path d="M 220 124 L 220 288" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrPurple)"/>
  <path d="M 318 192 L 280 192 L 280 122 L 318 122" fill="none" stroke="#e67e22" stroke-width="1.2" stroke-dasharray="5 4"/>

  <text x="24" y="340" font-family="system-ui, sans-serif" font-size="8" fill="#555">Legend:</text>
  <line x1="70" y1="336" x2="95" y2="336" stroke="#c0392b" stroke-width="2"/>
  <text x="100" y="340" font-family="system-ui, sans-serif" font-size="8" fill="#555">request / task flow</text>
  <line x1="200" y1="336" x2="225" y2="336" stroke="#2980b9" stroke-width="2"/>
  <text x="230" y="340" font-family="system-ui, sans-serif" font-size="8" fill="#555">tools to browser</text>
  <line x1="310" y1="336" x2="335" y2="336" stroke="#27ae60" stroke-width="2"/>
  <text x="340" y="340" font-family="system-ui, sans-serif" font-size="8" fill="#555">UI and results</text>
  <line x1="420" y1="336" x2="445" y2="336" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="450" y="340" font-family="system-ui, sans-serif" font-size="8" fill="#555">Hub to executor context</text>
</svg>
